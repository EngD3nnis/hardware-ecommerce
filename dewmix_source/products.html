function catLabel(p){ return (p.sub&&p.sub!==p.cat)?p.sub+' ('+p.cat+')':p.cat; }

function waMsg(products){
  if(products.length===1){
    var p=products[0];
    return 'Hello Dewmix!\n\nI would like a price quote for:\n\n\uD83C\uDFF7\uFE0F *'+p.name+'*\n\uD83D\uDCC2 '+catLabel(p)+'\n\uD83D\uDD22 SKU: '+(p.sku||pid(p))+'\n\uD83C\uDD94 ID: '+pid(p)+'\n\nPlease send price and availability. Thank you!';
  }
  var lines=products.map(function(p,i){
    return (i+1)+'. *'+p.name+'* ('+(p.sku||pid(p))+')';
  });
  return 'Hello Dewmix!\n\nI would like quotes for '+products.length+' products:\n\n'+lines.join('\n')+'\n\nPlease send prices and availability. Thank you!';
}

(function(){
  var raw=(new URLSearchParams(window.location.search).get('ids')||
           new URLSearchParams(window.location.search).get('products')||'');
  var div=document.getElementById('content');

  if(!raw){
    div.innerHTML='<div style="font-size:2rem;margin-bottom:12px">&#128230;</div><div class="msg">No products in this link</div><a href="https://dewmixhardware.com" class="btn" style="margin-top:16px">&#127968; Visit Dewmix Hardware</a>';
    return;
  }

  var ids=raw.split(',').map(Number).filter(function(n){return n>0&&!isNaN(n);});
  var prods=ids.map(function(id){return CATALOG.find(function(p){return p.id===id;});}).filter(Boolean);

  if(!prods.length){
    div.innerHTML='<div class="msg" style="color:#c00">Products not found</div><a href="https://dewmixhardware.com" class="btn" style="margin-top:16px">&#127968; Visit Dewmix Hardware</a>';
    return;
  }

  // Build the view URL — links into index.html which has working images
  var base=window.location.href.replace(/\/products\.html.*$/,'/');
  var viewUrl;
  if(prods.length===1){
    viewUrl=base+'index.html#product-'+prods[0].id;
  } else {
    viewUrl=base+'index.html?products='+ids.join(',');
  }

  // Show product list immediately
  var items=prods.map(function(p){
    return '<div class="prod-item">'+
      '<div class="prod-name">'+p.name+'</div>'+
      '<div class="prod-cat">'+catLabel(p)+'</div>'+
      '<div class="prod-sku">'+(p.sku||pid(p))+'</div>'+
    '</div>';
  }).join('');

  var waHref='https://wa.me/'+WA+'?text='+encodeURIComponent(waMsg(prods));

  div.innerHTML=
    '<div style="font-size:.82rem;color:#666;margin-bottom:14px;font-weight:600">'+
      prods.length+' product'+(prods.length>1?'s':'')+' in this quote:'+
    '</div>'+

    '<a href="'+viewUrl+'" class="btn" style="display:flex;align-items:center;justify-content:center;gap:8px">'+

    '</a>'+

    '</a>'+
    '<a href="https://dewmixhardware.com" class="btn btn-sec">&#127968; Browse More Products</a>';

  // Also auto-redirect to index.html after 1.5s if single product
  // (gives customer time to see the product name first)
  if(prods.length===1){
    setTimeout(function(){
      window.location.href=viewUrl;
    }, 1500);
  }
})();
